<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MediCare — Lab Test Provider Details</title>
<link href="https://api.fontshare.com/v2/css?f[]=clash-display@400,500,600,700&f[]=satoshi@400,500,700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<link rel="stylesheet" href="assets/css/styles.css">
<style>
.checkout-layout { max-width: 600px; margin: 40px auto 80px; }
.checkout-main { background: white; border: 1.5px solid var(--gray200); border-radius: var(--radius-lg); padding: 32px; }
.checkout-title { font-family: var(--font-display); font-size: 24px; margin-bottom: 24px; color: var(--gray900); text-align: center; }

.summary-card { background: var(--g50); padding: 20px; border-radius: var(--radius-md); margin-bottom: 32px; border: 1px solid var(--gray200); }
.sc-title { font-weight: 600; font-size: 16px; margin-bottom: 4px; }
.sc-sub { font-size: 13px; color: var(--gray600); margin-bottom: 12px; }
.sc-price { font-size: 18px; font-weight: 700; color: var(--g700); }

.form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
.form-group { margin-bottom: 20px; }
.form-group.full { grid-column: 1 / -1; }
.form-group label { display: block; font-size: 13px; font-weight: 600; color: var(--gray700); margin-bottom: 6px; }
.form-group input, .form-group textarea { width: 100%; padding: 14px; border: 1.5px solid var(--gray200); border-radius: var(--radius-sm); outline: none; font-family: var(--font-body); }
</style>
<script src="assets/js/auth_helper.js"></script>
</head>
<body>

<nav id="navbar" class="scrolled">
  <div class="container">
    <div class="nav-inner">
      <a href="index.html" class="nav-logo">
        <div class="nav-logo-icon"><i class="fa-solid fa-capsules"></i></div>
        <span class="nav-logo-text">Medi<span>Care</span></span>
      </a>
    </div>
  </div>
</nav>

<div class="container" style="padding-top: var(--nav-h);">
    <div class="checkout-layout">
        <div class="checkout-main">
            <h1 class="checkout-title">Patient Details</h1>
            
            <div class="summary-card">
                <div class="sc-title" id="s-name">Test Name</div>
                <div class="sc-sub"><i class="fa-regular fa-calendar-check" style="margin-right:4px;"></i> <span id="s-date">Date</span> | <i class="fa-regular fa-clock" style="margin-left:8px; margin-right:4px;"></i> <span id="s-time">Time</span></div>
                <div class="sc-price" id="s-price">₹--</div>
            </div>
            
            <form id="booking-form" onsubmit="submitBooking(event)">
                <div class="form-grid">
                    <div class="form-group full">
                        <label>Patient Full Name</label>
                        <input type="text" id="p-name" required placeholder="John Doe">
                    </div>
                    <div class="form-group">
                        <label>Patient Age</label>
                        <input type="number" id="p-age" required min="1" max="120" placeholder="e.g. 30">
                    </div>
                    <div class="form-group">
                        <label>Contact Number</label>
                        <input type="tel" id="p-contact" required placeholder="+91">
                    </div>
                    <div class="form-group full">
                        <label>Home Collection Address</label>
                        <textarea id="p-address" required rows="3" placeholder="Full exact address for phlebotomist..."></textarea>
                    </div>
                </div>
                
                <button type="submit" class="btn btn-primary" style="width:100%; justify-content:center; padding:16px; margin-top:16px;" id="btn-submit">Confirm Booking <i class="fa-solid fa-check"></i></button>
                <div id="form-msg" style="margin-top: 16px; text-align: center; font-weight: 600; font-size: 15px;"></div>
            </form>
        </div>
    </div>
</div>

<script>
let testData = null;
let testDate = null;
let testTime = null;

document.addEventListener('DOMContentLoaded', () => {
    const rawData = sessionStorage.getItem('lab_checkout_test');
    testDate = sessionStorage.getItem('lab_checkout_date');
    testTime = sessionStorage.getItem('lab_checkout_time');
    
    if (!rawData || !testDate || !testTime) {
        window.location.href = 'lab_tests.html';
        return;
    }
    
    // Default fill name from user
    document.getElementById('p-name').value = localStorage.getItem('medcare_name') || '';
    
    testData = JSON.parse(rawData);
    document.getElementById('s-name').textContent = testData.name;
    document.getElementById('s-date').textContent = testDate;
    document.getElementById('s-time').textContent = testTime;
    document.getElementById('s-price').textContent = '₹' + parseFloat(testData.price).toFixed(2);
});

async function submitBooking(e) {
    e.preventDefault();
    const btn = document.getElementById('btn-submit');
    const msg = document.getElementById('form-msg');
    
    btn.disabled = true;
    btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Processing...';
    
    const payload = {
        customer_id: localStorage.getItem('medcare_uid') || localStorage.getItem('medcare_token') || 'guest',
        customer_name: localStorage.getItem('medcare_name') || 'Guest',
        test_id: testData.id,
        test_name: testData.name,
        lab_name: testData.lab_name || 'City PathLabs',
        lab_id: testData.lab_id || '',
        price: testData.price,
        date: testDate,
        time: testTime,
        patient_name: document.getElementById('p-name').value,
        patient_age: document.getElementById('p-age').value,
        address: document.getElementById('p-address').value,
        contact: document.getElementById('p-contact').value,
        collection_mode: 'Home Collection'
    };
    
    try {
        const res = await fetchWithAuth('api/book_lab_test.php', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(payload)
        });
        
        if (res.ok) {
            msg.style.color = 'var(--g600)';
            msg.innerHTML = '<i class="fa-solid fa-circle-check"></i> Booking Successful! Redirecting...';
            sessionStorage.removeItem('lab_checkout_test');
            setTimeout(() => { window.location.href = 'customer_dashboard.html'; }, 2000);
        } else {
            throw new Error("Server error");
        }
    } catch(err) {
        msg.style.color = 'red';
        msg.textContent = 'Failed to create booking. Please try again.';
        btn.disabled = false;
        btn.innerHTML = 'Confirm Booking <i class="fa-solid fa-check"></i>';
    }
}
</script>
</body>
</html>
