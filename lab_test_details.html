<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MediCare — Test Details</title>
<link href="https://api.fontshare.com/v2/css?f[]=clash-display@400,500,600,700&f[]=satoshi@400,500,700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<link rel="stylesheet" href="assets/css/styles.css">
<style>
.detail-layout { display: grid; grid-template-columns: 1fr 350px; gap: 40px; margin: 40px 0 80px; }
.detail-main { background: white; border: 1.5px solid var(--gray200); border-radius: var(--radius-lg); padding: 32px; }
.detail-main h1 { font-family: var(--font-display); font-size: 28px; margin-bottom: 12px; color: var(--gray900); }
.d-req { background: #FEF3C7; color: #92400E; padding: 16px; border-radius: var(--radius-sm); margin: 24px 0; font-size: 14px; font-weight: 500; }
.d-req i { margin-right: 8px; }
.d-features { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin: 24px 0; }
.df-item { display: flex; align-items: flex-start; gap: 12px; }
.df-icon { width: 32px; height: 32px; background: var(--g50); color: var(--g600); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 14px; flex-shrink: 0; }
.df-text div:first-child { font-weight: 600; font-size: 14px; margin-bottom: 2px; }
.df-text div:last-child { font-size: 13px; color: var(--gray500); }

.book-card { background: white; border: 1.5px solid var(--gray200); border-radius: var(--radius-lg); padding: 24px; position: sticky; top: 100px; height: fit-content; box-shadow: 0 10px 30px rgba(0,0,0,0.03); }
.bc-price { font-size: 32px; font-weight: 700; color: var(--gray900); margin-bottom: 24px; }
.form-group { margin-bottom: 20px; }
.form-group label { display: block; font-size: 13px; font-weight: 600; color: var(--gray700); margin-bottom: 6px; }
.form-group input, .form-group select { width: 100%; padding: 14px; border: 1.5px solid var(--gray200); border-radius: var(--radius-sm); outline: none; font-family: var(--font-body); }
</style>
<script src="assets/js/auth_helper.js"></script>
</head>
<body>

<nav id="navbar" class="scrolled">
  <div class="container">
    <div class="nav-inner">
      <a href="index.html" class="nav-logo">
        <div class="nav-logo-icon"><i class="fa-solid fa-capsules"></i></div>
        <span class="nav-logo-text">Medi<span>Care</span></span>
      </a>
    </div>
  </div>
</nav>

<div class="container" style="padding-top: var(--nav-h);">
    <div style="margin: 20px 0;">
        <a href="lab_tests.html" style="text-decoration:none; color:var(--gray500); font-size:14px; font-weight:500;"><i class="fa-solid fa-arrow-left"></i> Back to Lab Tests</a>
    </div>

    <div id="loader" style="text-align:center; padding:60px; color:var(--gray500);"><i class="fa-solid fa-spinner fa-spin"></i> Loading test details...</div>
    
    <div class="detail-layout" id="content" style="display:none;">
        <div class="detail-main">
            <h1 id="t-name">Test Name</h1>
            <p id="t-desc" style="color:var(--gray600); line-height:1.6;"></p>
            
            <div class="d-req">
                <i class="fa-solid fa-triangle-exclamation"></i> <strong style="margin-right:4px;">Requirements:</strong> <span id="t-req">Loading...</span>
            </div>
            
            <h3 style="font-family:var(--font-display); font-size:20px; margin-top:32px; margin-bottom:16px;">What's included in this test?</h3>
            <div class="d-features">
                <div class="df-item">
                    <div class="df-icon"><i class="fa-solid fa-house-chimney-medical"></i></div>
                    <div class="df-text">
                        <div>Free Home Sample Collection</div>
                        <div>Our phlebotomist visits your home safely.</div>
                    </div>
                </div>
                <div class="df-item">
                    <div class="df-icon"><i class="fa-solid fa-file-pdf"></i></div>
                    <div class="df-text">
                        <div>Fast E-Reports</div>
                        <div>Get guaranteed reports within <span id="t-turn">24 hours</span>.</div>
                    </div>
                </div>
            </div>
        </div>
        
        <div>
            <div class="book-card">
                <div class="bc-price" id="t-price">₹--</div>
                
                <h4 style="margin-bottom:16px; font-size:15px;">Book your slot</h4>
                <div class="form-group">
                    <label>Preferred Date</label>
                    <input type="date" id="b-date" required>
                </div>
                <div class="form-group">
                    <label>Preferred Time</label>
                    <select id="b-time" required>
                        <option value="06:00 AM - 08:00 AM">06:00 AM - 08:00 AM</option>
                        <option value="08:00 AM - 10:00 AM">08:00 AM - 10:00 AM</option>
                        <option value="10:00 AM - 12:00 PM">10:00 AM - 12:00 PM</option>
                        <option value="12:00 PM - 02:00 PM">12:00 PM - 02:00 PM</option>
                    </select>
                </div>
                <button class="btn btn-primary" style="width:100%; justify-content:center; padding:16px;" onclick="proceedToCheckout()">Proceed <i class="fa-solid fa-arrow-right"></i></button>
            </div>
        </div>
    </div>
</div>

<script>
let currentTest = null;

document.addEventListener('DOMContentLoaded', () => {
    // Set min date to today
    const tzoffset = (new Date()).getTimezoneOffset() * 60000;
    const localISOTime = (new Date(Date.now() - tzoffset)).toISOString().split('T')[0];
    document.getElementById('b-date').min = localISOTime;
    document.getElementById('b-date').value = localISOTime;
    
    fetchTestDetails();
});

async function fetchTestDetails() {
    const params = new URLSearchParams(window.location.search);
    const id = params.get('id');
    if (!id) { window.location.href='lab_tests.html'; return; }
    
    try {
        const res = await fetchWithAuth('api/lab_tests.php');
        const data = await res.json();
        currentTest = data.find(t => t.id === id);
        
        if (!currentTest) throw new Error("Not found");
        
        document.getElementById('t-name').textContent = currentTest.name;
        document.getElementById('t-desc').textContent = currentTest.description;
        document.getElementById('t-req').textContent = currentTest.requirements;
        document.getElementById('t-turn').textContent = currentTest.turnaround_time;
        document.getElementById('t-price').textContent = '₹' + parseFloat(currentTest.price).toFixed(2);
        
        document.getElementById('loader').style.display = 'none';
        document.getElementById('content').style.display = 'grid';
    } catch(err) {
        document.getElementById('loader').innerHTML = '<span style="color:red;">Test not found.</span>';
    }
}

function proceedToCheckout() {
    const role = localStorage.getItem('medcare_role');
    if (role !== 'customer') {
        alert("Please sign in as a customer to book tests.");
        window.location.href = 'auth.html';
        return;
    }
    
    const date = document.getElementById('b-date').value;
    const time = document.getElementById('b-time').value;
    
    if(!date || !time) {
        alert("Please select date and time.");
        return;
    }
    
    // Pass everything to checkout via sessionStorage
    sessionStorage.setItem('lab_checkout_test', JSON.stringify(currentTest));
    sessionStorage.setItem('lab_checkout_date', date);
    sessionStorage.setItem('lab_checkout_time', time);
    
    window.location.href = 'lab_booking_checkout.html';
}
</script>
</body>
</html>
